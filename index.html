<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

  <body>
    <section>

        <div class="container hero">
          <h1>Hoàng Tùng - Hà Bích</h1>
          <p class="slogan">We got married</p>

              <p>Bà Nguyễn Dung</p>

        </div>
        <div class="container container-welcome">
          <h2>trân trọng kính mời</h2>
          <div class="welcom-flex">
            <div class="welcome-item">
              <img

                src="https://assets.cinelove.me/uploads/80804c06-219d-4fac-a1c9-0c27ff69dd1f/b166241c-75e9-4f5e-98ad-f3f6dbccc333.jpg"
                alt=""
              />
              <img
                class="title"
                src="https://assets.cinelove.me/templates/assets/d0b50b46-aeb0-4787-950d-2ad16e95ed6b/f53f068c-a2c7-477d-baef-690cce51f310.png"
                alt=""
              />
            </div>
            <div class="welcome-item">
              <img
                class="main"
                src="https://img.cinelove.me/uploads/80804c06-219d-4fac-a1c9-0c27ff69dd1f/51075011-2b7f-4a00-9611-722a4740af11.jpg?crop=181,0,726,1367"
                alt=""
              />
              <img
                class="title"
                src="https://assets.cinelove.me/templates/assets/d0b50b46-aeb0-4787-950d-2ad16e95ed6b/332f9d9d-70da-463f-beae-5d81160e33bf.png"
                alt=""
              />
            </div>
          </div>
        </div>
        <div class="container container-calendar">
          <div class="couple-name">
            <h2>Hoàng Tùng</h2>
            <img
              src="https://assets.cinelove.me/templates/assets/d0b50b46-aeb0-4787-950d-2ad16e95ed6b/e1ea4629-07a0-467f-87f0-da1f1406829c.png"
              alt=""
            />
            <h2>Hà Bích</h2>
          </div>
          <div class="text-love">L.O.V.E</div>
          <div class="calendar-box-wrapper">
            <div class="calendar-box-shadow"></div>

            <div class="calendar-box">
              <div class="calendar" id="wedding-calendar"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>

</html>
